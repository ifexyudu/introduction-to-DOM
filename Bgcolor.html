<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <div
      id="colorBox"
      class="w-40 h-40 rounded-2xl bg-gray-300"
    ></div>

    <script>
     const backgroundColor= document.querySelector("#colorBox")
     backgroundColor.classList.remove("bg-gray-300")
     backgroundColor.classList.add("bg-blue-900")

    </script>

  </body>
